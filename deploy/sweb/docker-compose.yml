services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      OUTPUT_DIR: /data/outputs
      INTERNAL_DB_PATH: /data/internal/internal.db
      # Production default provider/model for SWEB deploy.
      # Can be overridden in server environment if needed.
      VISION_PROVIDER: ${PROD_VISION_PROVIDER:-sber}
      SBER_VISION_MODEL: ${PROD_SBER_VISION_MODEL:-GigaChat-2-Max}
    volumes:
      - outputs_data:/data/outputs
      - internal_data:/data/internal
    expose:
      - "8000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    env_file:
      - ../../.env
    environment:
      OUTPUT_DIR: /data/outputs
      INTERNAL_DB_PATH: /data/internal/internal.db
      WORKER_POLL_SECONDS: "3"
      # Keep worker aligned with API provider/model in production.
      VISION_PROVIDER: ${PROD_VISION_PROVIDER:-sber}
      SBER_VISION_MODEL: ${PROD_SBER_VISION_MODEL:-GigaChat-2-Max}
    volumes:
      - outputs_data:/data/outputs
      - internal_data:/data/internal
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  outputs_data:
  internal_data:
