<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Обработка изображений</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #fff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
      --err: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 1rem 1.25rem 2rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      max-width: 56rem;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.sub { margin: 0 0 1rem; color: var(--muted); font-size: 0.9rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--muted); }
    select, input[type="file"] {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.4rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      background: #fff;
    }
    button[type="submit"] {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    button[type="submit"]:disabled { opacity: 0.55; cursor: not-allowed; }
    details { margin-top: 0.5rem; }
    summary { cursor: pointer; font-size: 0.85rem; color: var(--muted); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    .preview-wrap { margin-top: 0.75rem; }
    .preview-wrap h2 { font-size: 0.85rem; margin: 0 0 0.35rem; color: var(--muted); }
    .preview-wrap img {
      max-width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: repeating-conic-gradient(#e4e4e7 0% 25%, #fff 0% 50%) 50% / 16px 16px;
    }
    .meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.5rem; word-break: break-word; }
    .meta-main { color: var(--text); margin-bottom: 0.35rem; }
    .meta-main div + div { margin-top: 0.2rem; }
    .meta-tech { color: var(--muted); }
    .error { color: var(--err); font-size: 0.875rem; margin-top: 0.75rem; white-space: pre-wrap; }
    .ok-warn { font-size: 0.85rem; margin-top: 0.5rem; color: #a16207; }
    a.btn {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--accent);
      text-decoration: none;
    }
    a.btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Подготовка изображения</h1>
  <p class="sub">Загрузите изображение, выберите нужные параметры и нажмите «Обработать изображение».</p>

  <form id="form" class="card">
    <label for="image">Изображение</label>
    <input id="image" name="image" type="file" accept="image/*" required>

    <div class="row">
      <div>
        <label for="type">Тип изображения</label>
        <select id="type" name="type" required>
          <option value="product">Товар</option>
          <option value="category">Категория</option>
          <option value="banner">Баннер</option>
          <option value="portfolio_interior">Интерьер (портфолио)</option>
        </select>
      </div>
      <div>
        <label for="background">Фон</label>
        <select id="background" name="background">
          <option value="">По умолчанию (как в пресете)</option>
          <option value="keep">Сохранить исходный</option>
          <option value="white">Белый</option>
          <option value="transparent">Прозрачный</option>
          <option value="clean">Очистить фон</option>
        </select>
      </div>
    </div>

    <label for="format">Формат файла</label>
    <select id="format" name="format">
      <option value="">По умолчанию (как в пресете)</option>
      <option value="webp">WebP (рекомендуется)</option>
      <option value="jpeg">JPEG</option>
      <option value="png">PNG</option>
    </select>

    <label for="max_output_kb">Максимальный размер выходного файла</label>
    <select id="max_output_kb" name="max_output_kb">
      <option value="">По умолчанию (как в пресете)</option>
      <option value="150">150 КБ</option>
      <option value="200">200 КБ</option>
      <option value="250">250 КБ</option>
      <option value="300">300 КБ</option>
      <option value="350">350 КБ</option>
      <option value="400">400 КБ</option>
      <option value="500">500 КБ</option>
    </select>

    <label for="vision_choice">Модель Vision</label>
    <select id="vision_choice" name="vision_choice">
      <option value="">По умолчанию сервера</option>
      <option value="fallback">Без модели (только программная обработка)</option>
      <option value="sber_max">Sber GigaChat-2-Max</option>
      <option value="sber_pro">Sber GigaChat-2-Pro</option>
      <option value="openai">OpenAI</option>
    </select>

    <details>
      <summary>Дополнительные настройки</summary>
      <label for="style">Стиль обработки</label>
      <select id="style" name="style">
        <option value="">По умолчанию</option>
        <option value="neutral">Нейтральный</option>
        <option value="premium">Премиум</option>
        <option value="light">Легкий</option>
      </select>
      <label for="crop_mode">Обрезка</label>
      <select id="crop_mode" name="crop_mode">
        <option value="">По умолчанию (как в пресете)</option>
        <option value="center">По центру</option>
        <option value="smart">Умная</option>
      </select>
      <label for="quality_level">Качество</label>
      <select id="quality_level" name="quality_level">
        <option value="">По умолчанию (как в пресете)</option>
        <option value="standard">Стандартное</option>
        <option value="high">Высокое</option>
      </select>
    </details>

    <button type="submit" id="submit">Обработать изображение</button>
    <div id="err" class="error" hidden></div>
  </form>

  <div class="card" id="inPreviewCard" hidden>
    <h2 class="preview-wrap" style="margin:0;font-size:0.9rem;color:var(--muted)">Исходное изображение</h2>
    <div class="preview-wrap">
      <img id="inPreview" alt="Входное изображение">
    </div>
  </div>

  <div class="card" id="outCard" hidden>
    <h2 class="preview-wrap" style="margin:0;font-size:0.9rem;color:var(--muted)">Результат</h2>
    <div class="preview-wrap">
      <img id="outPreview" alt="Результат">
    </div>
    <div id="validationMsg" class="ok-warn" hidden></div>
    <div id="meta" class="meta"></div>
    <a id="download" class="btn" href="#" download hidden>Скачать файл</a>
  </div>

  <script>
(function () {
  const form = document.getElementById("form");
  const imageInput = document.getElementById("image");
  const errEl = document.getElementById("err");
  const submitBtn = document.getElementById("submit");
  const inCard = document.getElementById("inPreviewCard");
  const inPreview = document.getElementById("inPreview");
  const outCard = document.getElementById("outCard");
  const outPreview = document.getElementById("outPreview");
  const metaEl = document.getElementById("meta");
  const downloadEl = document.getElementById("download");
  const validationMsg = document.getElementById("validationMsg");
  let inObjectUrl = null;
  const typeLabels = {
    product: "Товар",
    category: "Категория",
    banner: "Баннер",
    portfolio_interior: "Интерьер (портфолио)"
  };
  const backgroundLabels = {
    keep: "Сохранить исходный",
    white: "Белый",
    transparent: "Прозрачный",
    clean: "Очистить фон"
  };
  const formatLabels = {
    webp: "WebP",
    jpeg: "JPEG",
    png: "PNG"
  };
  const cropLabels = {
    smart: "Умная",
    center: "По центру"
  };
  const qualityLabels = {
    high: "Высокое",
    standard: "Стандартное"
  };
  const styleLabels = {
    neutral: "Нейтральный",
    premium: "Премиум",
    light: "Легкий"
  };
  const presetDefaults = {
    product: { maxKb: 200, background: "white", format: "webp", crop: "smart", quality: "high", style: "neutral" },
    category: { maxKb: 250, background: "keep", format: "webp", crop: "smart", quality: "high", style: "neutral" },
    banner: { maxKb: 400, background: "keep", format: "webp", crop: "smart", quality: "high", style: "neutral" },
    portfolio_interior: { maxKb: 350, background: "keep", format: "webp", crop: "smart", quality: "high", style: "neutral" }
  };

  function selectedLabel(selectId, fallback) {
    const el = document.getElementById(selectId);
    if (!el) return fallback || "—";
    const idx = el.selectedIndex;
    if (idx < 0) return fallback || "—";
    const opt = el.options[idx];
    if (!opt || !opt.value) return fallback || "По умолчанию";
    return opt.textContent || fallback || "—";
  }

  function compactValue(value) {
    return value == null || value === "" ? "—" : String(value);
  }

  function esc(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function toKbLabel(value) {
    return value == null || value === "" ? "—" : String(value) + " КБ";
  }

  function effectiveByPreset(rawValue, typeValue, fallbackValue) {
    if (rawValue) return rawValue;
    const preset = presetDefaults[typeValue];
    return preset && preset[fallbackValue] != null ? preset[fallbackValue] : null;
  }

  function technicalError(statusCode, message, requestId) {
    const parts = [
      "code: " + compactValue(statusCode),
      "message: " + compactValue(message || "Ошибка запроса")
    ];
    if (requestId) parts.push("request_id: " + requestId);
    return "Техническая информация: " + parts.join(" | ");
  }

  function showTechnicalError(message) {
    setErr("");
    validationMsg.hidden = true;
    downloadEl.hidden = true;
    outPreview.removeAttribute("src");
    metaEl.innerHTML = '<div class="meta-tech">' + esc(message) + "</div>";
    outCard.hidden = false;
  }

  function setErr(msg) {
    errEl.textContent = msg || "";
    errEl.hidden = !msg;
  }

  imageInput.addEventListener("change", function () {
    if (inObjectUrl) URL.revokeObjectURL(inObjectUrl);
    inObjectUrl = null;
    inCard.hidden = true;
    const f = imageInput.files && imageInput.files[0];
    if (!f) return;
    inObjectUrl = URL.createObjectURL(f);
    inPreview.src = inObjectUrl;
    inCard.hidden = false;
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    setErr("");
    validationMsg.hidden = true;
    outCard.hidden = true;
    const file = imageInput.files && imageInput.files[0];
    if (!file) {
      setErr("Выберите файл.");
      return;
    }
    const fd = new FormData();
    fd.append("image", file);
    fd.append("type", document.getElementById("type").value);
    const bg = document.getElementById("background").value;
    if (bg) fd.append("background", bg);
    const fmt = document.getElementById("format").value;
    if (fmt) fd.append("format", fmt);
    const sty = document.getElementById("style").value;
    if (sty) fd.append("style", sty);
    const crop = document.getElementById("crop_mode").value;
    if (crop) fd.append("crop_mode", crop);
    const qual = document.getElementById("quality_level").value;
    if (qual) fd.append("quality_level", qual);
    const maxOutputKb = document.getElementById("max_output_kb").value;
    if (maxOutputKb) fd.append("max_output_kb", maxOutputKb);
    const visionChoice = document.getElementById("vision_choice").value;
    if (visionChoice === "sber_max") {
      fd.append("vision_provider", "sber");
      fd.append("vision_model", "GigaChat-2-Max");
    } else if (visionChoice === "sber_pro") {
      fd.append("vision_provider", "sber");
      fd.append("vision_model", "GigaChat-2-Pro");
    } else if (visionChoice === "fallback") {
      fd.append("vision_provider", "fallback");
    } else if (visionChoice === "openai") {
      fd.append("vision_provider", "openai");
    }

    submitBtn.disabled = true;
    try {
      const res = await fetch("/process-image", { method: "POST", body: fd });
      const requestId = res.headers.get("x-request-id") || "";
      let data = null;
      try {
        data = await res.json();
      } catch (_) {
        showTechnicalError(technicalError(res.status, "Некорректный ответ сервера", requestId));
        return;
      }
      const detail = data && data.detail;
      if (detail && res.status >= 400 && !data.file_id) {
        showTechnicalError(technicalError(res.status, String(detail), data.request_id || requestId));
        return;
      }
      if (!data.file_id) {
        showTechnicalError(technicalError(res.status, "Неожиданный ответ сервера", requestId));
        return;
      }
      const rel = "/outputs/" + data.file_id;
      const url = data.download_url && data.download_url.startsWith("http") ? data.download_url : rel;
      const ext = (data.format || "webp").toLowerCase();
      const fname = data.file_id + "." + (ext === "jpeg" ? "jpg" : ext);
      const hasValidOutput = data.validation_ok !== false && Number(data.size_kb || 0) > 0;
      if (hasValidOutput) {
        outPreview.src = rel + "?t=" + Date.now();
        downloadEl.href = url;
        downloadEl.setAttribute("download", fname);
        downloadEl.hidden = false;
      } else {
        outPreview.removeAttribute("src");
        downloadEl.hidden = true;
      }
      const typeValue = document.getElementById("type").value;
      const effBackground = data.background || effectiveByPreset(bg, typeValue, "background");
      const effFormat = (data.format || effectiveByPreset(fmt, typeValue, "format") || "webp").toLowerCase();
      const effMaxKb = data.max_output_kb != null ? data.max_output_kb : effectiveByPreset(maxOutputKb, typeValue, "maxKb");
      const effStyle = sty || effectiveByPreset(sty, typeValue, "style");
      const effCrop = crop || effectiveByPreset(crop, typeValue, "crop");
      const effQuality = qual || effectiveByPreset(qual, typeValue, "quality");
      const isNoModelFlow = visionChoice === "fallback" || data.vision_provider === "fallback";
      const modelName = isNoModelFlow
        ? "Без модели (программная обработка)"
        : (data.vision_model || selectedLabel("vision_choice", "По умолчанию сервера"));
      const providerName = data.vision_provider || (visionChoice ? "Выбран вручную" : "Сервер");
      const resolvedRequestId = data.request_id || requestId;
      const isVisionFallback = typeof data.vision_scene === "string" && data.vision_scene.toLowerCase().indexOf("fallback") === 0;
      const isNoModelMode = data.vision_provider === "fallback" || visionChoice === "fallback";
      const fallbackCode = String(data.vision_fallback_code || "").trim();
      const fallbackMessage = String(data.vision_fallback_message || "").trim();
      const fallbackTech = isNoModelMode
        ? " | mode: software_only (no external vision model)"
        : (fallbackCode
          ? " | code: " + fallbackCode + " | message: " + (fallbackMessage || "vision provider failed, heuristic fallback used")
          : (isVisionFallback ? " | code: vision_fallback | message: vision provider failed, heuristic fallback used" : ""));
      metaEl.innerHTML =
        '<div class="meta-main">' +
          "<div><strong>Модель:</strong> " + esc(compactValue(modelName)) + " (" + esc(compactValue(providerName)) + ")</div>" +
          "<div><strong>Параметры:</strong> тип: " + esc(typeLabels[typeValue] || typeValue) +
          ", фон: " + esc(backgroundLabels[effBackground] || effBackground || "—") +
          ", формат: " + esc(formatLabels[effFormat] || effFormat || "—") +
          ", макс. размер: " + esc(toKbLabel(effMaxKb)) +
          ", стиль: " + esc(styleLabels[effStyle] || effStyle || "—") +
          ", обрезка: " + esc(cropLabels[effCrop] || effCrop || "—") +
          ", качество: " + esc(qualityLabels[effQuality] || effQuality || "—") +
          "</div>" +
          "<div><strong>Размер изображения:</strong> " + esc((data.width || "?") + "×" + (data.height || "?")) +
          " | <strong>Размер файла:</strong> " + esc(data.size_kb != null ? String(data.size_kb) + " KB" : "—") + "</div>" +
        "</div>" +
        '<div class="meta-tech">Техническая информация: vision ' + esc(data.vision_ms != null ? data.vision_ms + " ms" : "—") +
        " | всего " + esc(data.processing_time_ms != null ? data.processing_time_ms + " ms" : "—") +
        " | request_id " + esc(resolvedRequestId || "—") +
        " | HTTP " + esc(res.status) +
        esc(fallbackTech) + "</div>";
      if (data.validation_ok === false) {
        validationMsg.textContent = "validation_ok=false: " + JSON.stringify(data.validation_errors || []);
        validationMsg.hidden = false;
      }
      outCard.hidden = false;
    } catch (ex) {
      showTechnicalError(technicalError("fetch_error", ex && ex.message ? ex.message : String(ex), ""));
    } finally {
      submitBtn.disabled = false;
    }
  });
})();
  </script>
</body>
</html>
