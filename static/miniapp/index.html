<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Сценарии обработки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 12px; max-width: 520px; margin-inline: auto; }
    h1 { font-size: 1.1rem; margin: 0 0 8px; }
    h2 { font-size: 1rem; margin: 16px 0 8px; }
    .err { color: #c00; white-space: pre-wrap; font-size: 0.9rem; margin: 8px 0; }
    .ok { color: #080; font-size: 0.9rem; }
    .hint { font-size: 0.8rem; opacity: 0.75; margin-bottom: 12px; }
    ul.presets { list-style: none; padding: 0; margin: 0 0 12px; }
    ul.presets li { margin: 6px 0; }
    button.preset {
      width: 100%; text-align: left; padding: 10px 12px;
      border-radius: 10px; border: 1px solid #8886; cursor: pointer;
      background: #fff3; font-size: 1rem;
    }
    button.preset.active { border-color: #08f; background: #08f2; }
    input[type=file] { margin: 8px 0; width: 100%; }
    button.run { width: 100%; padding: 12px; font-size: 1rem; margin-top: 8px; border-radius: 10px; border: none; background: #08f; color: #fff; cursor: pointer; }
    button.run:disabled { opacity: 0.5; cursor: not-allowed; }
    button.textbtn { background: transparent; border: none; color: #08f; cursor: pointer; font-size: 0.9rem; padding: 4px 0; }
    a.dl { display: inline-block; margin-top: 8px; word-break: break-all; font-size: 0.95rem; }
    #jobs { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; max-height: 220px; overflow-y: auto; }
    #jobs li { padding: 8px; margin: 4px 0; border-radius: 8px; border: 1px solid #8884; }
    #jobs .st { opacity: 0.85; font-size: 0.8rem; }
    .cfg { font-size: 0.75rem; opacity: 0.65; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Сценарии</h1>
  <p class="hint">Другой домен API: задайте <code>window.__API_BASE__</code> (URL без / в конце).</p>
  <div id="cfgLine" class="cfg" hidden></div>
  <div id="err" class="err" hidden></div>
  <div id="greet"></div>
  <ul id="presets" class="presets"></ul>
  <input type="file" id="fileEl" accept="image/jpeg,image/png,image/webp" />
  <button type="button" class="run" id="runBtn" disabled>Обработать</button>
  <div id="status" class="ok"></div>
  <a id="dl" class="dl" hidden target="_blank" rel="noopener"></a>

  <h2>История задач</h2>
  <button type="button" class="textbtn" id="refreshHistory">Обновить</button>
  <ul id="jobs"></ul>

  <script>
    window.__API_BASE__ = window.__API_BASE__ || '';
    var accessToken = null;
    var legacyUserId = null;
    var selectedKey = null;
    var clientMaxBytes = 25 * 1024 * 1024;
    var tg = window.Telegram && window.Telegram.WebApp;

    function apiUrl(path) {
      return window.__API_BASE__ + path;
    }

    function formatDetail(data, status, fallback) {
      if (data && data.request_id) {
        /* keep for debugging */
      }
      var d = data && data.detail;
      if (d == null) return fallback || ('Ошибка ' + status);
      if (typeof d === 'string') return d;
      if (Array.isArray(d)) {
        return d.map(function (x) {
          if (typeof x === 'string') return x;
          if (x && x.msg) return x.msg;
          return JSON.stringify(x);
        }).join('; ');
      }
      return String(d);
    }

    function showErr(msg) {
      var el = document.getElementById('err');
      el.textContent = msg || '';
      el.hidden = !msg;
    }

    function setStatus(t) {
      document.getElementById('status').textContent = t || '';
    }

    function api(path, opts) {
      var headers = Object.assign({}, (opts && opts.headers) || {});
      if (!(opts && opts.body instanceof FormData)) {
        headers['Content-Type'] = 'application/json';
      }
      if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
      return fetch(apiUrl(path), Object.assign({}, opts, { headers: headers }));
    }

    function fileToBase64(file) {
      return new Promise(function (resolve, reject) {
        var fr = new FileReader();
        fr.onload = function () {
          var s = fr.result;
          var i = String(s).indexOf(',');
          resolve(i >= 0 ? s.slice(i + 1) : s);
        };
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }

    async function loadClientConfig() {
      try {
        var r = await api('/internal/client-config');
        var data = await r.json().catch(function () { return {}; });
        if (!r.ok) return;
        if (data.max_upload_bytes) clientMaxBytes = data.max_upload_bytes;
        var el = document.getElementById('cfgLine');
        el.hidden = false;
        el.textContent = 'Лимит файла: до ' + (data.max_upload_mb || '?') + ' МБ; JWT: ' +
          (data.jwt_required ? 'да' : 'нет') + '; параллельных задач: ' +
          (data.max_concurrent_jobs_per_user || '?');
      } catch (e) { /* ignore */ }
    }

    async function loadHistory() {
      var path = '/internal/jobs?limit=20';
      if (!accessToken) {
        var uid = (legacyUserId || window.__DEBUG_USER_ID__ || '').trim();
        if (!uid) return;
        path += '&user_id=' + encodeURIComponent(uid);
      }
      var r = await api(path);
      var data = await r.json().catch(function () { return {}; });
      var ul = document.getElementById('jobs');
      ul.innerHTML = '';
      if (!r.ok) {
        var li = document.createElement('li');
        li.textContent = formatDetail(data, r.status, 'История недоступна');
        ul.appendChild(li);
        return;
      }
      (data.items || []).forEach(function (j) {
        var li = document.createElement('li');
        var line = (j.preset_key || '') + ' — ' + (j.status || '');
        li.appendChild(document.createTextNode(line));
        var st = document.createElement('div');
        st.className = 'st';
        st.textContent = (j.id || '').slice(0, 8) + '… ' + (j.created_at || '');
        li.appendChild(st);
        if (j.status === 'done' && j.download_url) {
          var a = document.createElement('a');
          a.href = j.download_url.indexOf('http') === 0 ? j.download_url : (window.__API_BASE__ || '') + j.download_url;
          a.textContent = 'Скачать';
          a.target = '_blank';
          a.rel = 'noopener';
          li.appendChild(a);
        }
        if (j.status === 'failed' && j.error_message) {
          st.textContent += ' — ' + String(j.error_message).slice(0, 120);
        }
        ul.appendChild(li);
      });
      if (!(data.items || []).length) {
        var empty = document.createElement('li');
        empty.textContent = 'Пока нет задач';
        ul.appendChild(empty);
      }
    }

    async function auth() {
      showErr('');
      if (tg) {
        tg.ready();
        tg.expand();
      }
      await loadClientConfig();
      var initData = tg && tg.initData;
      if (!initData) {
        showErr('Откройте приложение из Telegram (нет initData).');
        return false;
      }
      var r = await api('/internal/auth/telegram', {
        method: 'POST',
        body: JSON.stringify({ init_data: initData }),
      });
      var data = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        showErr(formatDetail(data, r.status, 'Ошибка входа'));
        return false;
      }
      if (data.access_token) accessToken = data.access_token;
      else if (data.user && data.user.id) legacyUserId = data.user.id;
      var u = data.user || {};
      document.getElementById('greet').textContent =
        (u.full_name || u.username || 'Сотрудник') + (data.access_token ? ' (JWT)' : ' (без JWT)');
      return true;
    }

    async function loadPresets() {
      var r = await api('/internal/presets');
      var data = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        showErr(formatDetail(data, r.status, 'Пресеты'));
        return;
      }
      var ul = document.getElementById('presets');
      ul.innerHTML = '';
      (data.items || []).forEach(function (p) {
        var li = document.createElement('li');
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'preset';
        b.textContent = p.title;
        b.dataset.key = p.key;
        b.onclick = function () {
          selectedKey = p.key;
          Array.prototype.forEach.call(ul.querySelectorAll('button'), function (x) {
            x.classList.toggle('active', x.dataset.key === selectedKey);
          });
          document.getElementById('runBtn').disabled = !selectedKey || !document.getElementById('fileEl').files.length;
        };
        li.appendChild(b);
        ul.appendChild(li);
      });
    }

    async function pollJob(jobId) {
      var path = '/internal/jobs/' + encodeURIComponent(jobId);
      if (!accessToken) {
        var uid = (legacyUserId || window.__DEBUG_USER_ID__ || '').trim();
        if (uid) path += '?user_id=' + encodeURIComponent(uid);
      }
      var r = await api(path);
      var d = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        showErr(formatDetail(d, r.status, 'Статус задачи'));
        return null;
      }
      return d;
    }

    document.getElementById('fileEl').onchange = function () {
      showErr('');
      var f = this.files && this.files[0];
      if (f && f.size > clientMaxBytes) {
        showErr('Файл слишком большой (макс. ' + Math.round(clientMaxBytes / (1024 * 1024)) + ' МБ). Выберите другое фото.');
        this.value = '';
        document.getElementById('runBtn').disabled = true;
        return;
      }
      document.getElementById('runBtn').disabled = !selectedKey || !f;
    };

    document.getElementById('runBtn').onclick = async function () {
      showErr('');
      setStatus('');
      document.getElementById('dl').hidden = true;
      var f = document.getElementById('fileEl').files[0];
      if (!selectedKey || !f) return;
      if (f.size > clientMaxBytes) {
        showErr('Файл слишком большой.');
        return;
      }
      var b64 = await fileToBase64(f);
      var body = { preset_key: selectedKey, image_base64: b64 };
      if (!accessToken) {
        var uid = (legacyUserId || window.__DEBUG_USER_ID__ || '').trim();
        if (!uid) {
          showErr('Нет JWT: задайте INTERNAL_JWT_SECRET на сервере.');
          return;
        }
        body.user_id = uid;
      }
      var r = await api('/internal/jobs', { method: 'POST', body: JSON.stringify(body) });
      var data = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        showErr(formatDetail(data, r.status, String(r.status)));
        return;
      }
      var jobId = data.id;
      setStatus('В очереди…');
      for (var i = 0; i < 120; i++) {
        await new Promise(function (x) { setTimeout(x, 1500); });
        var j = await pollJob(jobId);
        if (!j) return;
        if (j.status === 'failed') {
          showErr(j.error_message || 'Ошибка обработки');
          loadHistory();
          return;
        }
        if (j.status === 'done' && j.download_url) {
          setStatus('Готово');
          var a = document.getElementById('dl');
          a.href = j.download_url.indexOf('http') === 0 ? j.download_url : (window.__API_BASE__ || '') + j.download_url;
          a.textContent = 'Скачать результат';
          a.hidden = false;
          loadHistory();
          return;
        }
        setStatus('Статус: ' + (j.status || '…'));
      }
      showErr('Таймаут ожидания');
      loadHistory();
    };

    document.getElementById('refreshHistory').onclick = function () { loadHistory(); };

    (async function start() {
      if (!(await auth())) return;
      await loadPresets();
      await loadHistory();
    })();
  </script>
</body>
</html>
