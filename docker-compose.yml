services:
  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      OUTPUT_DIR: /data/outputs
    volumes:
      - outputs_data:/data/outputs
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"

  proxy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api

volumes:
  outputs_data:
